# Fly app config — Task 1: boot the Nix-built image and confirm it runs.
# Scale-to-zero, services, volume and secrets come in later tasks.
app = "outpost-wiki"
primary_region = "syd" # Sydney is similar pricing to NA, same as other is asia

[build]
  # Image is built out-of-band by ./build-image.sh and pushed by ./deploy.sh.

# The proxy WAKES a stopped machine on an inbound connection (auto_start), but
# never stops it itself (auto_stop = off) — the in-container idle-watcher will
# do a clean self-halt later. min_machines_running = 0 lets it scale to zero.
[http_service]
  internal_port = 8080          # TODO: set to the paseo daemon's listen port
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 0

# Persistent state lives here: the wiki git repo and the paseo daemon home.
# Survives machine stop/start (scale-to-zero). Created by ./deploy.sh if missing.
# A volume is bound to one machine in one region — fine for our single-machine setup.
[[mounts]]
  source = "outpost_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
