# Fly app config — Task 1: boot the Nix-built image and confirm it runs.
# Scale-to-zero, services, volume and secrets come in later tasks.
app = "outpost-wiki"
primary_region = "syd" # Sydney is similar pricing to NA, same as other is asia

[build]
  # Image is built out-of-band by ./build-image.sh and pushed by ./deploy.sh.

[env]
  # SSH URL of the private wiki repo, cloned into ~/llm-wiki on first boot.
  WIKI_REPO = "git@github.com:jay-aye-see-kay/llm-wiki.git"
  # Idle-watcher: minutes of no opencode activity before clean self-halt.
  # Kept low (1m) so a stray bot poke only costs ~1m of awake time, not 5m.
  IDLE_MINUTES = "1"

# The proxy WAKES a stopped machine on an inbound connection (auto_start), but
# never stops it itself (auto_stop = off) — the in-container idle-watcher will
# do a clean self-halt later. min_machines_running = 0 lets it scale to zero.
#
# Explicit [[services]] (not the [http_service] shorthand) so we publish ONLY
# 443. The shorthand also opens port 80, which dumb scanners hammer — every hit
# there would wake the machine just to issue an https redirect. The phone always
# uses https, so port 80 buys us nothing but extra wake-ups.
[[services]]
  internal_port = 8080          # opencode web server (opencode web --port 8080)
  protocol = "tcp"
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 0

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]   # proxy terminates TLS, forwards http to :8080

  # Cold-start race fix: on a scale-to-zero wake, flyd reports the machine
  # "started" before opencode (Bun) has bound :8080, so the proxy used to try
  # connecting, get "connection refused", and give up after ~8s (intermittent
  # boot failures + a red "unhealthy" badge). A TCP check makes the proxy wait
  # for opencode to actually listen — grace_period covers the slow Bun boot —
  # before routing traffic or marking the machine unhealthy.
  [[services.tcp_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"   # bump if logs show opencode taking longer to bind

# Persistent state lives here: the wiki git repo (~/llm-wiki) and opencode's DB
# (~/.local/share/opencode, which holds the zen auth token + sessions). The
# volume is mounted as HOME, so both survive machine stop/start (scale-to-zero).
# Created by ./deploy.sh if missing. A volume is bound to one machine in one
# region — fine for our single-machine setup.
[[mounts]]
  source = "outpost_data"
  destination = "/root"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

# Free swap (carved from rootfs disk, not billed as RAM). opencode/Bun idles
# high (~800MB); this lets the kernel page out cold pages so bursts don't OOM.
swap_size_mb = 512
